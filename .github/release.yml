# .github/release.yml
changelog:
  exclude:
    commits: false
  
  categories:
    - title: "🚀 New Features"
      labels: [] # Leave empty for commits
      # This regex matches commit messages starting with "feat:" or "feat(...):"
      commit-prefixes: 
        - "feat:"
        - "feat("
    - title: "🐛 Bug Fixes"
      labels: []
      commit-prefixes:
        - "fix:"
        - "fix("
    - title: "📝 Documentation"
      labels: []
      commit-prefixes:
        - "docs:"
        - "docs("