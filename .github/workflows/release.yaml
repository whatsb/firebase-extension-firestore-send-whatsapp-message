name: Create GitHub Release

on:
  push:
    tags:
      - 'v*' # Triggers the workflow only when tags starting with 'v' are pushed

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    # Crucial permission block to allow the GITHUB_TOKEN to create releases
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release with GitHub CLI
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}